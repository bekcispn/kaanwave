<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaanWave • Ara</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
        }

        #app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 140, 0, 0.2);
            padding: 30px 0;
            position: fixed;
            height: 100vh;
        }

        .sidebar-logo {
            padding: 0 20px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo svg {
            width: 40px;
            height: 40px;
        }

        .sidebar-logo span {
            color: #FFA500;
            font-size: 22px;
            font-weight: 700;
        }

        .nav-menu {
            padding: 0 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .nav-item:hover {
            background: rgba(255, 140, 0, 0.1);
            color: #FFA500;
        }

        .nav-item.active {
            background: rgba(255, 140, 0, 0.2);
            color: #FFA500;
            border-left: 4px solid #FF8C00;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .main-area {
            flex: 1;
            margin-left: 260px;
            padding: 30px 40px;
            padding-bottom: 120px;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .search-container {
            max-width: 600px;
            margin-bottom: 30px;
        }

        .search-box {
            background: rgba(255, 140, 0, 0.08);
            border: 2px solid rgba(255, 140, 0, 0.2);
            border-radius: 50px;
            padding: 14px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-box:focus-within {
            border-color: #FF8C00;
            background: rgba(255, 140, 0, 0.12);
        }

        .search-box svg {
            width: 22px;
            height: 22px;
            color: #FFA500;
        }

        #search-input {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            width: 100%;
            outline: none;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .section-header {
            margin: 30px 0 20px;
        }

        .section-header h2 {
            color: white;
            font-size: 26px;
            font-weight: 700;
        }

        .search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .result-card {
            background: rgba(20, 15, 0, 0.6);
            border: 1.5px solid rgba(255, 140, 0, 0.2);
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .result-card:hover {
            background: rgba(255, 140, 0, 0.12);
            border-color: #FF8C00;
            transform: translateY(-5px);
        }

        .result-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .result-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-title {
            color: white;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .result-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF8C00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="4" y1="4" x2="20" y2="20">
                            <stop offset="0%" stop-color="#FFA500"/>
                            <stop offset="100%" stop-color="#FF6B00"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 4L4 8L12 12L20 8L12 4Z" fill="url(#logoGrad)"/>
                    <path d="M4 12L12 16L20 12" stroke="#FFA500" stroke-width="2"/>
                </svg>
                <span>KaanWave</span>
            </div>
            <div class="nav-menu">
                <a href="home.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 12l9-9 9 9M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
                    </svg>
                    Ana Sayfa
                </a>
                <a href="search.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4-4"/>
                    </svg>
                    Ara
                </a>
                <a href="library.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="8" height="8" rx="1"/>
                        <rect x="13" y="3" width="8" height="8" rx="1"/>
                        <rect x="3" y="13" width="8" height="8" rx="1"/>
                        <rect x="13" y="13" width="8" height="8" rx="1"/>
                    </svg>
                    Kütüphane
                </a>
            </div>
        </div>

        <div class="main-area">
            <div class="top-header">
                <div class="user-area">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">K</div>
                        <span id="username">Kullanıcı</span>
                    </div>
                </div>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4-4"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Şarkı, sanatçı veya albüm ara...">
                    <button onclick="search()" style="background: none; border: none; color: #FFA500; cursor: pointer;">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="section-header">
                <h2>Arama Sonuçları</h2>
            </div>

            <div class="search-results" id="search-results">
                <p style="color: rgba(255,255,255,0.5);">Arama yapmak için yukarıdaki kutuyu kullanın...</p>
            </div>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('kaanwave_user');
        if (!user) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('username').textContent = user;
            document.getElementById('userAvatar').textContent = user[0].toUpperCase();
        }

        async function search() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '<p style="color: #FFA500;">Aranıyor...</p>';

            // Demo arama sonuçları (gerçek API olmadan)
            setTimeout(() => {
                const demoResults = [
                    { name: query + ' - Popüler Şarkı', artist: 'Sanatçı 1', cover: 'https://via.placeholder.com/200/FF8C00/FFFFFF?text=' + query },
                    { name: query + ' - Remix', artist: 'Sanatçı 2', cover: 'https://via.placeholder.com/200/FF6B00/FFFFFF?text=' + query },
                    { name: query + ' - Live', artist: 'Sanatçı 3', cover: 'https://via.placeholder.com/200/FFA500/FFFFFF?text=' + query }
                ];

                resultsDiv.innerHTML = '';
                demoResults.forEach(result => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <div class="result-cover">
                            <img src="${result.cover}" alt="${result.name}">
                        </div>
                        <div class="result-title">${result.name}</div>
                        <div class="result-subtitle">${result.artist}</div>
                    `;
                    resultsDiv.appendChild(card);
                });
            }, 1000);
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
