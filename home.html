<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaanWave • Ana Sayfa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
        }

        #app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 140, 0, 0.2);
            padding: 30px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 0 20px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo svg {
            width: 40px;
            height: 40px;
        }

        .sidebar-logo span {
            color: #FFA500;
            font-size: 22px;
            font-weight: 700;
        }

        .nav-menu {
            padding: 0 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .nav-item:hover {
            background: rgba(255, 140, 0, 0.1);
            color: #FFA500;
        }

        .nav-item.active {
            background: rgba(255, 140, 0, 0.2);
            color: #FFA500;
            border-left: 4px solid #FF8C00;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .main-area {
            flex: 1;
            margin-left: 260px;
            padding: 30px 40px;
            padding-bottom: 120px;
            min-height: 100vh;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .categories {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .category {
            background: rgba(255, 140, 0, 0.1);
            border: 1.5px solid rgba(255, 140, 0, 0.2);
            padding: 10px 20px;
            border-radius: 40px;
            color: #FFD700;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category:hover {
            background: rgba(255, 140, 0, 0.2);
            border-color: #FF8C00;
        }

        .category.active {
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            color: white;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 20px;
        }

        .section-header h2 {
            color: white;
            font-size: 26px;
            font-weight: 700;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .playlist-card {
            background: rgba(20, 15, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 140, 0, 0.2);
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .playlist-card:hover {
            background: rgba(255, 140, 0, 0.12);
            border-color: #FF8C00;
            transform: translateY(-5px);
        }

        .playlist-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 6px 0 #994C00;
        }

        .playlist-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-title {
            color: white;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .playlist-desc {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .tracks-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tracks-table thead tr {
            border-bottom: 1px solid rgba(255, 140, 0, 0.3);
        }

        .tracks-table th {
            text-align: left;
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
        }

        .track-row {
            cursor: pointer;
            transition: all 0.2s;
        }

        .track-row:hover {
            background: rgba(255, 140, 0, 0.1);
        }

        .track-row.playing {
            background: rgba(255, 140, 0, 0.15);
        }

        .track-row td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .track-cover {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            overflow: hidden;
        }

        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-name {
            color: white;
            font-weight: 500;
        }

        .track-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .track-duration {
            color: rgba(255, 255, 255, 0.4);
        }

        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(30px);
            border-top: 2px solid #FF8C00;
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 300px;
        }

        .now-playing-cover {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
        }

        .now-playing-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #player-title {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        #player-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .player-controls {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .player-btn {
            background: none;
            border: none;
            color: #FFA500;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px;
        }

        .player-btn:hover {
            color: #FFD700;
            transform: scale(1.1);
        }

        .player-btn svg {
            width: 24px;
            height: 24px;
        }

        .player-btn.play svg {
            width: 40px;
            height: 40px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #FFA500;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 140, 0, 0.2);
            border-top-color: #FF8C00;
            border-radius: 50%;
            animation: spin 1s infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF8C00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="4" y1="4" x2="20" y2="20">
                            <stop offset="0%" stop-color="#FFA500"/>
                            <stop offset="100%" stop-color="#FF6B00"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 4L4 8L12 12L20 8L12 4Z" fill="url(#logoGrad)"/>
                    <path d="M4 12L12 16L20 12" stroke="#FFA500" stroke-width="2"/>
                </svg>
                <span>KaanWave</span>
            </div>
            <div class="nav-menu">
                <a href="home.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 12l9-9 9 9M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
                    </svg>
                    Ana Sayfa
                </a>
                <a href="search.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4-4"/>
                    </svg>
                    Ara
                </a>
                <a href="library.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="8" height="8" rx="1"/>
                        <rect x="13" y="3" width="8" height="8" rx="1"/>
                        <rect x="3" y="13" width="8" height="8" rx="1"/>
                        <rect x="13" y="13" width="8" height="8" rx="1"/>
                    </svg>
                    Kütüphane
                </a>
            </div>
        </div>

        <div class="main-area">
            <div class="top-header">
                <div class="user-area">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">K</div>
                        <span id="username">Kullanıcı</span>
                    </div>
                    <button class="logout-btn" onclick="logout()">Çıkış</button>
                </div>
            </div>

            <div class="categories">
                <span class="category active" onclick="loadCategory('pop')">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                    Pop
                </span>
                <span class="category" onclick="loadCategory('rock')">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path d="M12 2L2 7v10l10 5 10-5V7l-10-5z"/>
                    </svg>
                    Rock
                </span>
                <span class="category" onclick="loadCategory('rap')">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                    </svg>
                    Rap
                </span>
                <span class="category" onclick="loadCategory('electronic')">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path d="M20 12H4M12 4v16"/>
                    </svg>
                    Elektronik
                </span>
                <span class="category" onclick="loadCategory('turkish')">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path d="M12 2v20M22 12H2"/>
                    </svg>
                    Türkçe
                </span>
            </div>

            <div class="section-header">
                <h2>Öne Çıkan Albümler</h2>
            </div>

            <div class="playlist-grid" id="albums-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Albümler yükleniyor...</p>
                </div>
            </div>

            <div class="section-header">
                <h2>Popüler Şarkılar</h2>
            </div>

            <table class="tracks-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Şarkı</th>
                        <th>Albüm</th>
                        <th>Süre</th>
                    </tr>
                </thead>
                <tbody id="tracks-body">
                    <tr><td colspan="4" class="loading">Şarkılar yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="player-bar">
            <div class="now-playing">
                <div class="now-playing-cover" id="player-cover">
                    <img src="https://via.placeholder.com/60x60/FF8C00/FFFFFF?text=🎵" alt="Cover">
                </div>
                <div>
                    <div id="player-title">Şarkı Seçilmedi</div>
                    <div id="player-artist">KaanWave</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="player-btn" onclick="previousTrack()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6v12l-10-6 10-6zM5 6v12"/>
                    </svg>
                </button>
                <button class="player-btn play" id="play-btn" onclick="togglePlay()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M10 8l6 4-6 4V8z" fill="currentColor"/>
                    </svg>
                </button>
                <button class="player-btn" onclick="nextTrack()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M5 6v12l10-6-10-6zM19 6v12"/>
                    </svg>
                </button>
            </div>
            <div style="width: 300px;"></div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const user = localStorage.getItem('kaanwave_user');
        if (!user) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('username').textContent = user;
            document.getElementById('userAvatar').textContent = user[0].toUpperCase();
        }

        let currentTrack = null;
        let isPlaying = false;
        let audio = document.getElementById('audio-player');
        let currentPlaylist = [];
        let currentIndex = 0;

        // DEEZER API - CORS YOK, HIZLI, ÜCRETSİZ
        async function loadCategory(category = 'pop') {
            document.querySelectorAll('.category').forEach(cat => cat.classList.remove('active'));
            event.target.closest('.category').classList.add('active');

            const albumsGrid = document.getElementById('albums-grid');
            albumsGrid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Albümler yükleniyor...</p></div>';

            try {
                // Deezer API - Chart (Popüler Albümler)
                const albumsResponse = await fetch(`https://api.deezer.com/chart/0/albums?limit=6`);
                const albumsData = await albumsResponse.json();
                renderAlbums(albumsData.data);

                // Deezer API - Chart (Popüler Şarkılar)
                const tracksResponse = await fetch(`https://api.deezer.com/chart/0/tracks?limit=20`);
                const tracksData = await tracksResponse.json();
                renderTracks(tracksData.data);
            } catch (error) {
                console.error('API Error:', error);
                loadFallbackData();
            }
        }

        async function searchCategory(query) {
            const albumsGrid = document.getElementById('albums-grid');
            albumsGrid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Aranıyor...</p></div>';

            try {
                // Deezer Search API
                const albumsResponse = await fetch(`https://api.deezer.com/search/album?q=${query}&limit=6`);
                const albumsData = await albumsResponse.json();
                renderAlbums(albumsData.data);

                const tracksResponse = await fetch(`https://api.deezer.com/search/track?q=${query}&limit=20`);
                const tracksData = await tracksResponse.json();
                renderTracks(tracksData.data);
            } catch (error) {
                console.error('Search Error:', error);
            }
        }

        function renderAlbums(albums) {
            const grid = document.getElementById('albums-grid');
            grid.innerHTML = '';
            
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'playlist-card';
                card.onclick = () => loadAlbumTracks(album.id, album.title);
                card.innerHTML = `
                    <div class="playlist-cover">
                        <img src="${album.cover_medium}" alt="${album.title}">
                    </div>
                    <div class="playlist-title">${album.title}</div>
                    <div class="playlist-desc">${album.artist.name}</div>
                `;
                grid.appendChild(card);
            });
        }

        function renderTracks(tracks) {
            const tbody = document.getElementById('tracks-body');
            tbody.innerHTML = '';
            
            currentPlaylist = tracks;
            
            tracks.forEach((track, index) => {
                const tr = document.createElement('tr');
                tr.className = 'track-row';
                tr.onclick = () => playTrack(track, index);
                
                const minutes = Math.floor(track.duration / 60);
                const seconds = track.duration % 60;
                const duration = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>
                        <div class="track-info">
                            <div class="track-cover">
                                <img src="${track.album.cover_small}" alt="${track.title}">
                            </div>
                            <div>
                                <div class="track-name">${track.title}</div>
                                <div class="track-artist">${track.artist.name}</div>
                            </div>
                        </div>
                    </td>
                    <td>${track.album.title}</td>
                    <td class="track-duration">${duration}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function loadAlbumTracks(albumId, albumTitle) {
            const tbody = document.getElementById('tracks-body');
            tbody.innerHTML = '<tr><td colspan="4" class="loading"><div class="spinner"></div><p>Albüm şarkıları yükleniyor...</p></td></tr>';
            
            try {
                const response = await fetch(`https://api.deezer.com/album/${albumId}/tracks`);
                const data = await response.json();
                renderTracks(data.data);
            } catch (error) {
                console.error('Album tracks error:', error);
            }
        }

        function playTrack(track, index) {
            currentTrack = track;
            currentIndex = index;
            
            if (!track.preview) {
                alert('Bu şarkının önizlemesi mevcut değil!');
                return;
            }
            
            audio.src = track.preview;
            audio.play();
            isPlaying = true;
            
            document.getElementById('player-title').textContent = track.title;
            document.getElementById('player-artist').textContent = track.artist.name;
            document.getElementById('player-cover').innerHTML = `<img src="${track.album.cover_medium}" alt="${track.title}">`;
            
            updatePlayButton();
            
            document.querySelectorAll('.track-row').forEach(el => el.classList.remove('playing'));
            event?.currentTarget?.classList.add('playing');
        }

        function togglePlay() {
            if (!audio.src) {
                alert('Önce bir şarkı seçin!');
                return;
            }
            
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
            isPlaying = !isPlaying;
            updatePlayButton();
        }

        function updatePlayButton() {
            const btn = document.getElementById('play-btn');
            btn.innerHTML = isPlaying ? 
                '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><rect x="8" y="8" width="3" height="8" fill="currentColor"/><rect x="13" y="8" width="3" height="8" fill="currentColor"/></svg>' :
                '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><path d="M10 8l6 4-6 4V8z" fill="currentColor"/></svg>';
        }

        function nextTrack() {
            if (currentPlaylist.length > 0 && currentTrack) {
                const nextIndex = (currentIndex + 1) % currentPlaylist.length;
                playTrack(currentPlaylist[nextIndex], nextIndex);
            }
        }

        function previousTrack() {
            if (currentPlaylist.length > 0 && currentTrack) {
                const prevIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
                playTrack(currentPlaylist[prevIndex], prevIndex);
            }
        }

        function loadFallbackData() {
            const fallbackTracks = [
                { title: "Flowers", artist: { name: "Miley Cyrus" }, album: { title: "Endless Summer Vacation", cover_small: "https://e-cdns-images.dzcdn.net/images/cover/4e8f3a7d4e8f3a7d4e8f3a7d4e8f3a7d/56x56-000000-80-0-0.jpg", cover_medium: "https://e-cdns-images.dzcdn.net/images/cover/4e8f3a7d4e8f3a7d4e8f3a7d4e8f3a7d/250x250-000000-80-0-0.jpg" }, preview: "https://cdns-preview-4.dzcdn.net/stream/c-4e8f3a7d4e8f3a7d4e8f3a7d4e8f3a7d-3.mp3", duration: 200 },
                { title: "As It Was", artist: { name: "Harry Styles" }, album: { title: "Harry's House", cover_small: "https://e-cdns-images.dzcdn.net/images/cover/5f9a4b8c5f9a4b8c5f9a4b8c5f9a4b8c/56x56-000000-80-0-0.jpg", cover_medium: "https://e-cdns-images.dzcdn.net/images/cover/5f9a4b8c5f9a4b8c5f9a4b8c5f9a4b8c/250x250-000000-80-0-0.jpg" }, preview: "https://cdns-preview-5.dzcdn.net/stream/c-5f9a4b8c5f9a4b8c5f9a4b8c5f9a4b8c-3.mp3", duration: 167 }
            ];
            renderTracks(fallbackTracks);
            
            const grid = document.getElementById('albums-grid');
            grid.innerHTML = '<div class="playlist-card"><div class="playlist-cover"><img src="https://via.placeholder.com/180/FF8C00/FFFFFF?text=Album"></div><div class="playlist-title">Popüler Albümler</div><div class="playlist-desc">Deezer Chart</div></div>';
        }

        function logout() {
            localStorage.removeItem('kaanwave_user');
            window.location.href = 'index.html';
        }

        audio.addEventListener('ended', nextTrack);
        audio.addEventListener('pause', () => { isPlaying = false; updatePlayButton(); });
        audio.addEventListener('play', () => { isPlaying = true; updatePlayButton(); });

        window.onload = () => {
            loadCategory('pop');
        };

        // Kategori fonksiyonlarını güncelle
        window.loadCategory = function(cat) {
            if (cat === 'turkish') {
                searchCategory('turkish');
            } else if (cat === 'pop') {
                loadCategory('pop');
            } else {
                searchCategory(cat);
            }
        };
    </script>
</body>
</html>
