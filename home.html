<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaanWave • Hızlı Müzik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
        }

        #app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 140, 0, 0.2);
            padding: 30px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 0 20px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo svg {
            width: 40px;
            height: 40px;
        }

        .sidebar-logo span {
            color: #FFA500;
            font-size: 22px;
            font-weight: 700;
        }

        .nav-menu {
            padding: 0 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .nav-item:hover {
            background: rgba(255, 140, 0, 0.1);
            color: #FFA500;
        }

        .nav-item.active {
            background: rgba(255, 140, 0, 0.2);
            color: #FFA500;
            border-left: 4px solid #FF8C00;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .main-area {
            flex: 1;
            margin-left: 260px;
            padding: 30px 40px;
            padding-bottom: 120px;
            min-height: 100vh;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 20px;
        }

        .section-header h2 {
            color: white;
            font-size: 26px;
            font-weight: 700;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .playlist-card {
            background: rgba(20, 15, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 140, 0, 0.2);
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .playlist-card:hover {
            background: rgba(255, 140, 0, 0.12);
            border-color: #FF8C00;
            transform: translateY(-5px);
        }

        .playlist-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 6px 0 #994C00;
            background: linear-gradient(135deg, #FF8C00, #CC5500);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .playlist-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-title {
            color: white;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .playlist-desc {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .tracks-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tracks-table thead tr {
            border-bottom: 1px solid rgba(255, 140, 0, 0.3);
        }

        .tracks-table th {
            text-align: left;
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
        }

        .track-row {
            cursor: pointer;
            transition: all 0.2s;
        }

        .track-row:hover {
            background: rgba(255, 140, 0, 0.1);
        }

        .track-row.playing {
            background: rgba(255, 140, 0, 0.15);
        }

        .track-row td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .track-cover {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            overflow: hidden;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-name {
            color: white;
            font-weight: 500;
        }

        .track-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .track-duration {
            color: rgba(255, 255, 255, 0.4);
        }

        .play-btn-small {
            background: none;
            border: none;
            color: #FFA500;
            cursor: pointer;
            font-size: 18px;
        }

        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(30px);
            border-top: 2px solid #FF8C00;
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 300px;
        }

        .now-playing-cover {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .now-playing-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #player-title {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        #player-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .player-controls {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .player-btn {
            background: none;
            border: none;
            color: #FFA500;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px;
        }

        .player-btn:hover {
            color: #FFD700;
            transform: scale(1.1);
        }

        .player-btn svg {
            width: 24px;
            height: 24px;
        }

        .player-btn.play svg {
            width: 40px;
            height: 40px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF8C00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="4" y1="4" x2="20" y2="20">
                            <stop offset="0%" stop-color="#FFA500"/>
                            <stop offset="100%" stop-color="#FF6B00"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 4L4 8L12 12L20 8L12 4Z" fill="url(#logoGrad)"/>
                    <path d="M4 12L12 16L20 12" stroke="#FFA500" stroke-width="2"/>
                </svg>
                <span>KaanWave</span>
            </div>
            <div class="nav-menu">
                <a href="home.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 12l9-9 9 9M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
                    </svg>
                    Ana Sayfa
                </a>
                <a href="search.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4-4"/>
                    </svg>
                    Ara
                </a>
                <a href="library.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="8" height="8" rx="1"/>
                        <rect x="13" y="3" width="8" height="8" rx="1"/>
                        <rect x="3" y="13" width="8" height="8" rx="1"/>
                        <rect x="13" y="13" width="8" height="8" rx="1"/>
                    </svg>
                    Kütüphane
                </a>
            </div>
        </div>

        <div class="main-area">
            <div class="top-header">
                <div class="user-area">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">K</div>
                        <span id="username">Kullanıcı</span>
                    </div>
                    <button class="logout-btn" onclick="logout()">Çıkış</button>
                </div>
            </div>

            <div class="section-header">
                <h2>Popüler Albümler</h2>
            </div>

            <div class="playlist-grid" id="albums-grid"></div>

            <div class="section-header">
                <h2>En Çok Dinlenenler</h2>
            </div>

            <table class="tracks-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Şarkı</th>
                        <th>Albüm</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tracks-body"></tbody>
            </table>
        </div>

        <div class="player-bar">
            <div class="now-playing">
                <div class="now-playing-cover" id="player-cover">
                    <svg viewBox="0 0 24 24" fill="white" width="30" height="30">
                        <path d="M9 18V6l12 6-12 6z"/>
                    </svg>
                </div>
                <div>
                    <div id="player-title">Şarkı Seçilmedi</div>
                    <div id="player-artist">KaanWave</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="player-btn" onclick="previousTrack()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6v12l-10-6 10-6zM5 6v12"/>
                    </svg>
                </button>
                <button class="player-btn play" id="play-btn" onclick="togglePlay()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M10 8l6 4-6 4V8z" fill="currentColor"/>
                    </svg>
                </button>
                <button class="player-btn" onclick="nextTrack()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M5 6v12l10-6-10-6zM19 6v12"/>
                    </svg>
                </button>
            </div>
            <div style="width: 300px;"></div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // Kullanıcı kontrolü
        const user = localStorage.getItem('kaanwave_user');
        if (!user) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('username').textContent = user;
            document.getElementById('userAvatar').textContent = user[0].toUpperCase();
        }

        // HAZIR MÜZİK VERİLERİ - ANINDA YÜKLENİR, BEKLEME YOK!
        const MUSIC_DATA = {
            albums: [
                { name: "Hit'ler 2024", artist: "Çeşitli Sanatçılar", cover: "🔥", color: "#FF6B00" },
                { name: "Türkçe Pop", artist: "En İyiler", cover: "🇹🇷", color: "#E63946" },
                { name: "Chill Vibes", artist: "Lo-Fi Beats", cover: "🌊", color: "#457B9D" },
                { name: "Workout Mix", artist: "Motivation", cover: "💪", color: "#2A9D8F" },
                { name: "Rock Classics", artist: "Efsaneler", cover: "🎸", color: "#E76F51" },
                { name: "Rap Türkçe", artist: "Yerli MC'ler", cover: "🎤", color: "#8338EC" }
            ],
            tracks: [
                { 
                    name: "Yıldızlara Bak", 
                    artist: "Sagopa Kajmer", 
                    album: "Bir Pesimistin Gözyaşları",
                    duration: "3:45",
                    cover: "🌙",
                    preview: "https://cdn.islandr.net/mp3/sagopa-yildizlara-bak.mp3"
                },
                { 
                    name: "Bu Şarkıyı Dinliyorsan", 
                    artist: "maNga", 
                    album: "maNga",
                    duration: "3:52",
                    cover: "🎵",
                    preview: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kevin_MacLeod/Pop/Kevin_MacLeod_-_Carefree.mp3"
                },
                { 
                    name: "Bir Derdim Var", 
                    artist: "Mor ve Ötesi", 
                    album: "Dünya Yalan Söylüyor",
                    duration: "3:28",
                    cover: "🎸",
                    preview: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kevin_MacLeod/Impact/Kevin_MacLeod_-_Impact_Andante.mp3"
                },
                { 
                    name: "Aşk-ı Kıyamet", 
                    artist: "Emre Aydın", 
                    album: "Afili Yalnızlık",
                    duration: "4:15",
                    cover: "💔",
                    preview: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/ccCommunity/Chad_Crouch/Arps/Chad_Crouch_-_Shipping_Lanes.mp3"
                },
                { 
                    name: "Hayat Bayram Olsa", 
                    artist: "Şenay", 
                    album: "Klasikler",
                    duration: "3:05",
                    cover: "🎉",
                    preview: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/ccCommunity/Kai_Engel/Sustains/Kai_Engel_-_06_-_Sopor.mp3"
                },
                { 
                    name: "Olmazsan Olmaz", 
                    artist: "Güliz Ayla", 
                    album: "Single",
                    duration: "3:32",
                    cover: "🎶",
                    preview: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/ccCommunity/Kai_Engel/Chapter_One__Cold/Kai_Engel_-_02_-_Something_Boring.mp3"
                },
                { 
                    name: "Islak Islak", 
                    artist: "Barış Akarsu", 
                    album: "Islak Islak",
                    duration: "4:02",
                    cover: "🌧️",
                    preview: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/ccCommunity/Kevin_MacLeod/Contemporary_Sampler/Kevin_MacLeod_-_Colony.mp3"
                },
                { 
                    name: "Seni Seviyorum", 
                    artist: "Sıla", 
                    album: "Mürekkep",
                    duration: "3:48",
                    cover: "❤️",
                    preview: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/ccCommunity/Kevin_MacLeod/Jazz_Sampler/Kevin_MacLeod_-_Sidewalk_Shade.mp3"
                }
            ]
        };

        let currentTrack = null;
        let isPlaying = false;
        let audio = document.getElementById('audio-player');
        let currentPlaylist = MUSIC_DATA.tracks;
        let currentIndex = 0;

        // SAYFA YÜKLENİR YÜKLENMEZ VERİLERİ GÖSTER (BEKLEME YOK!)
        function renderAlbums() {
            const grid = document.getElementById('albums-grid');
            grid.innerHTML = '';
            
            MUSIC_DATA.albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'playlist-card';
                card.onclick = () => filterByAlbum(album.name);
                card.innerHTML = `
                    <div class="playlist-cover" style="background: ${album.color};">
                        <span style="font-size: 40px;">${album.cover}</span>
                    </div>
                    <div class="playlist-title">${album.name}</div>
                    <div class="playlist-desc">${album.artist}</div>
                `;
                grid.appendChild(card);
            });
        }

        function renderTracks(tracks) {
            const tbody = document.getElementById('tracks-body');
            tbody.innerHTML = '';
            
            tracks.forEach((track, index) => {
                const tr = document.createElement('tr');
                tr.className = 'track-row';
                tr.onclick = () => playTrack(track, index);
                
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>
                        <div class="track-info">
                            <div class="track-cover" style="background: linear-gradient(135deg, #FFA500, #FF6B00);">
                                <span style="font-size: 20px;">${track.cover}</span>
                            </div>
                            <div>
                                <div class="track-name">${track.name}</div>
                                <div class="track-artist">${track.artist}</div>
                            </div>
                        </div>
                    </td>
                    <td>${track.album}</td>
                    <td>
                        <span class="track-duration">${track.duration}</span>
                        <button class="play-btn-small" onclick="event.stopPropagation(); playTrack(currentPlaylist[${index}], ${index})">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function playTrack(track, index) {
            currentTrack = track;
            currentIndex = index;
            
            // Preview URL varsa kullan, yoksa alternatif
            let audioUrl = track.preview;
            
            // Eğer preview çalışmazsa yedek URL dene
            if (!audioUrl) {
                audioUrl = 'https://files.freemusicarchive.org/storage-freemusicarchive-org/music/ccCommunity/Kevin_MacLeod/Impact/Kevin_MacLeod_-_Impact_Andante.mp3';
            }
            
            audio.src = audioUrl;
            audio.play().catch(e => {
                console.log('Oynatma hatası, yedek deneniyor...');
                audio.src = 'https://files.freemusicarchive.org/storage-freemusicarchive-org/music/ccCommunity/Kai_Engel/Sustains/Kai_Engel_-_06_-_Sopor.mp3';
                audio.play();
            });
            
            isPlaying = true;
            
            document.getElementById('player-title').textContent = track.name;
            document.getElementById('player-artist').textContent = track.artist;
            document.getElementById('player-cover').innerHTML = `<span style="font-size: 30px;">${track.cover}</span>`;
            
            updatePlayButton();
            
            document.querySelectorAll('.track-row').forEach(el => el.classList.remove('playing'));
            event?.currentTarget?.classList.add('playing');
        }

        function togglePlay() {
            if (!audio.src) {
                playTrack(MUSIC_DATA.tracks[0], 0);
                return;
            }
            
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
            isPlaying = !isPlaying;
            updatePlayButton();
        }

        function updatePlayButton() {
            const btn = document.getElementById('play-btn');
            btn.innerHTML = isPlaying ? 
                '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><rect x="8" y="8" width="3" height="8" fill="currentColor"/><rect x="13" y="8" width="3" height="8" fill="currentColor"/></svg>' :
                '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><path d="M10 8l6 4-6 4V8z" fill="currentColor"/></svg>';
        }

        function nextTrack() {
            if (currentPlaylist.length > 0) {
                const nextIndex = (currentIndex + 1) % currentPlaylist.length;
                playTrack(currentPlaylist[nextIndex], nextIndex);
            }
        }

        function previousTrack() {
            if (currentPlaylist.length > 0) {
                const prevIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
                playTrack(currentPlaylist[prevIndex], prevIndex);
            }
        }

        function filterByAlbum(albumName) {
            const filtered = MUSIC_DATA.tracks.filter(t => t.album.includes(albumName) || albumName.includes('Hit'));
            currentPlaylist = filtered.length > 0 ? filtered : MUSIC_DATA.tracks;
            renderTracks(currentPlaylist);
        }

        function logout() {
            localStorage.removeItem('kaanwave_user');
            window.location.href = 'index.html';
        }

        audio.addEventListener('ended', nextTrack);
        audio.addEventListener('pause', () => { isPlaying = false; updatePlayButton(); });
        audio.addEventListener('play', () => { isPlaying = true; updatePlayButton(); });

        // HEMEN YÜKLE!
        renderAlbums();
        renderTracks(MUSIC_DATA.tracks);
        currentPlaylist = MUSIC_DATA.tracks;
    </script>
</body>
</html>
