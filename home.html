<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaanWave • Ana Sayfa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
        }

        #app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 140, 0, 0.2);
            padding: 30px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 0 20px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo svg {
            width: 40px;
            height: 40px;
        }

        .sidebar-logo span {
            color: #FFA500;
            font-size: 22px;
            font-weight: 700;
        }

        .nav-menu {
            padding: 0 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .nav-item:hover {
            background: rgba(255, 140, 0, 0.1);
            color: #FFA500;
        }

        .nav-item.active {
            background: rgba(255, 140, 0, 0.2);
            color: #FFA500;
            border-left: 4px solid #FF8C00;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        /* Main Area */
        .main-area {
            flex: 1;
            margin-left: 260px;
            padding: 30px 40px;
            padding-bottom: 120px;
            min-height: 100vh;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        /* Section Headers */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 20px;
        }

        .section-header h2 {
            color: white;
            font-size: 26px;
            font-weight: 700;
        }

        /* Playlist Grid */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .playlist-card {
            background: rgba(20, 15, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 140, 0, 0.2);
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .playlist-card:hover {
            background: rgba(255, 140, 0, 0.12);
            border-color: #FF8C00;
            transform: translateY(-5px);
        }

        .playlist-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 6px 0 #994C00;
            overflow: hidden;
        }

        .playlist-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-title {
            color: white;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .playlist-desc {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        /* Tracks Table */
        .tracks-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tracks-table thead tr {
            border-bottom: 1px solid rgba(255, 140, 0, 0.3);
        }

        .tracks-table th {
            text-align: left;
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
        }

        .track-row {
            cursor: pointer;
            transition: all 0.2s;
        }

        .track-row:hover {
            background: rgba(255, 140, 0, 0.1);
        }

        .track-row.playing {
            background: rgba(255, 140, 0, 0.15);
        }

        .track-row td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .track-cover {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            overflow: hidden;
        }

        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-name {
            color: white;
            font-weight: 500;
        }

        .track-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* Player Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(30px);
            border-top: 2px solid #FF8C00;
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 300px;
        }

        .now-playing-cover {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
        }

        .now-playing-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #player-title {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        #player-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .player-controls {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .player-btn {
            background: none;
            border: none;
            color: #FFA500;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px;
        }

        .player-btn:hover {
            color: #FFD700;
            transform: scale(1.1);
        }

        .player-btn svg {
            width: 24px;
            height: 24px;
        }

        .player-btn.play svg {
            width: 40px;
            height: 40px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: #FFA500;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF8C00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="4" y1="4" x2="20" y2="20">
                            <stop offset="0%" stop-color="#FFA500"/>
                            <stop offset="100%" stop-color="#FF6B00"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 4L4 8L12 12L20 8L12 4Z" fill="url(#logoGrad)"/>
                    <path d="M4 12L12 16L20 12" stroke="#FFA500" stroke-width="2"/>
                </svg>
                <span>KaanWave</span>
            </div>
            <div class="nav-menu">
                <a href="home.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 12l9-9 9 9M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
                    </svg>
                    Ana Sayfa
                </a>
                <a href="search.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4-4"/>
                    </svg>
                    Ara
                </a>
                <a href="library.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="8" height="8" rx="1"/>
                        <rect x="13" y="3" width="8" height="8" rx="1"/>
                        <rect x="3" y="13" width="8" height="8" rx="1"/>
                        <rect x="13" y="13" width="8" height="8" rx="1"/>
                    </svg>
                    Kütüphane
                </a>
            </div>
        </div>

        <div class="main-area">
            <div class="top-header">
                <div class="user-area">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">K</div>
                        <span id="username">Kullanıcı</span>
                    </div>
                    <button class="logout-btn" onclick="logout()">Çıkış</button>
                </div>
            </div>

            <div class="section-header">
                <h2>Öne Çıkan Playlist'ler</h2>
            </div>

            <div class="playlist-grid" id="featured-playlists"></div>

            <div class="section-header">
                <h2>Popüler Şarkılar</h2>
            </div>

            <table class="tracks-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Şarkı</th>
                        <th>Albüm</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tracks-body"></tbody>
            </table>
        </div>

        <div class="player-bar">
            <div class="now-playing">
                <div class="now-playing-cover" id="player-cover">
                    <img src="https://via.placeholder.com/60x60/FF8C00/FFFFFF?text=🎵" alt="Cover">
                </div>
                <div>
                    <div id="player-title">Şarkı Seçilmedi</div>
                    <div id="player-artist">KaanWave</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="player-btn" onclick="previousTrack()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6v12l-10-6 10-6zM5 6v12"/>
                    </svg>
                </button>
                <button class="player-btn play" id="play-btn" onclick="togglePlay()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M10 8l6 4-6 4V8z" fill="currentColor"/>
                    </svg>
                </button>
                <button class="player-btn" onclick="nextTrack()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M5 6v12l10-6-10-6zM19 6v12"/>
                    </svg>
                </button>
            </div>
            <div style="width: 300px;"></div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const CLIENT_ID = '0c92e7e7d4b94e9f8e5b8e9f8e5b8e9f';
        const CLIENT_SECRET = '4a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d';
        
        let accessToken = '';
        let currentTrack = null;
        let isPlaying = false;
        let audio = document.getElementById('audio-player');

        // Kullanıcı kontrolü
        const user = localStorage.getItem('kaanwave_user');
        if (!user) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('username').textContent = user;
            document.getElementById('userAvatar').textContent = user[0].toUpperCase();
        }

        // Spotify Token Al
        async function getAccessToken() {
            try {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET)
                    },
                    body: 'grant_type=client_credentials'
                });
                const data = await response.json();
                accessToken = data.access_token;
                loadContent();
            } catch (error) {
                console.error('Token error:', error);
                loadFallbackContent();
            }
        }

        // Gerçek Spotify Verilerini Yükle
        async function loadContent() {
            try {
                // Popüler şarkıları getir
                const tracksResponse = await fetch('https://api.spotify.com/v1/playlists/37i9dQZF1DXcBWIGoYBM5M/tracks', {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const tracksData = await tracksResponse.json();
                renderTracks(tracksData.items);

                // Öne çıkan playlist'leri getir
                const playlistsResponse = await fetch('https://api.spotify.com/v1/browse/featured-playlists?limit=6', {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const playlistsData = await playlistsResponse.json();
                renderPlaylists(playlistsData.playlists.items);
            } catch (error) {
                console.error('API error:', error);
                loadFallbackContent();
            }
        }

        function renderTracks(items) {
            const tbody = document.getElementById('tracks-body');
            tbody.innerHTML = '';
            
            items.slice(0, 10).forEach((item, index) => {
                const track = item.track;
                const tr = document.createElement('tr');
                tr.className = 'track-row';
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>
                        <div class="track-info">
                            <div class="track-cover">
                                <img src="${track.album.images[0]?.url || 'https://via.placeholder.com/45/FF8C00/FFFFFF'}" alt="${track.name}">
                            </div>
                            <div>
                                <div class="track-name">${track.name}</div>
                                <div class="track-artist">${track.artists.map(a => a.name).join(', ')}</div>
                            </div>
                        </div>
                    </td>
                    <td>${track.album.name}</td>
                    <td>
                        <button onclick="playTrack('${track.preview_url}', '${track.name}', '${track.artists[0].name}', '${track.album.images[0]?.url}')">▶</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderPlaylists(playlists) {
            const container = document.getElementById('featured-playlists');
            container.innerHTML = '';
            
            playlists.forEach(playlist => {
                const card = document.createElement('div');
                card.className = 'playlist-card';
                card.innerHTML = `
                    <div class="playlist-cover">
                        <img src="${playlist.images[0]?.url || 'https://via.placeholder.com/180/FF8C00/FFFFFF'}" alt="${playlist.name}">
                    </div>
                    <div class="playlist-title">${playlist.name}</div>
                    <div class="playlist-desc">${playlist.description || playlist.owner.display_name}</div>
                `;
                container.appendChild(card);
            });
        }

        function loadFallbackContent() {
            // API çalışmazsa yedek veriler
            const fallbackTracks = [
                { name: "Blinding Lights", artist: "The Weeknd", album: "After Hours", cover: "https://i.scdn.co/image/ab67616d0000b2738863bc11d2aa12b54f5aeb36", preview: "https://p.scdn.co/mp3-preview/2c6e1d6c6e1d6c6e1d6c6e1d6c6e1d6c6e1d6c6e" },
                { name: "Stay", artist: "The Kid LAROI", album: "F*CK LOVE", cover: "https://i.scdn.co/image/ab67616d0000b273ba266789471d8d9e3f1d9c1f", preview: "https://p.scdn.co/mp3-preview/3d7f2e6c3d7f2e6c3d7f2e6c3d7f2e6c3d7f2e6c" },
                { name: "As It Was", artist: "Harry Styles", album: "Harry's House", cover: "https://i.scdn.co/image/ab67616d0000b273b5e8f8e9f8e5b8e9f8e5b8e9", preview: "https://p.scdn.co/mp3-preview/4e8f3a7d4e8f3a7d4e8f3a7d4e8f3a7d4e8f3a7d" }
            ];
            
            const tbody = document.getElementById('tracks-body');
            tbody.innerHTML = '';
            fallbackTracks.forEach((track, i) => {
                const tr = document.createElement('tr');
                tr.className = 'track-row';
                tr.innerHTML = `
                    <td>${i+1}</td>
                    <td><div class="track-info"><div class="track-cover"><img src="${track.cover}"></div><div><div class="track-name">${track.name}</div><div class="track-artist">${track.artist}</div></div></div></td>
                    <td>${track.album}</td>
                    <td><button onclick="playTrack('${track.preview}', '${track.name}', '${track.artist}', '${track.cover}')">▶</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function playTrack(preview, name, artist, cover) {
            if (!preview) {
                alert('Bu şarkının önizlemesi yok!');
                return;
            }
            
            audio.src = preview;
            audio.play();
            isPlaying = true;
            
            document.getElementById('player-title').textContent = name;
            document.getElementById('player-artist').textContent = artist;
            document.getElementById('player-cover').innerHTML = `<img src="${cover || 'https://via.placeholder.com/60/FF8C00/FFFFFF'}" alt="${name}">`;
            
            updatePlayButton();
        }

        function togglePlay() {
            if (!audio.src) {
                alert('Önce bir şarkı seçin!');
                return;
            }
            
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
            isPlaying = !isPlaying;
            updatePlayButton();
        }

        function updatePlayButton() {
            const btn = document.getElementById('play-btn');
            btn.innerHTML = isPlaying ? 
                '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><rect x="8" y="8" width="3" height="8" fill="currentColor"/><rect x="13" y="8" width="3" height="8" fill="currentColor"/></svg>' :
                '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><path d="M10 8l6 4-6 4V8z" fill="currentColor"/></svg>';
        }

        function nextTrack() {
            alert('Sonraki şarkıya geçiliyor...');
        }

        function previousTrack() {
            alert('Önceki şarkıya geçiliyor...');
        }

        function logout() {
            localStorage.removeItem('kaanwave_user');
            window.location.href = 'index.html';
        }

        audio.addEventListener('ended', () => {
            isPlaying = false;
            updatePlayButton();
        });

        // Sayfa yüklendiğinde
        getAccessToken();
    </script>
</body>
</html>
