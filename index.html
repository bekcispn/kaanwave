<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaanWave • Giriş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0a00, #1a1000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(20, 15, 0, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #FF8C00;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 50px rgba(255, 140, 0, 0.3);
        }

        .login-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 20px #FF8C00);
        }

        .login-header h1 {
            color: #FFA500;
            font-size: 32px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #FFB366;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group svg {
            width: 18px;
            height: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 140, 0, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #FF8C00;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.2);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 0 #994C00;
            transition: all 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #994C00;
        }

        .login-btn svg {
            width: 20px;
            height: 20px;
        }

        #error-message {
            color: #ff4444;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="4" y1="4" x2="20" y2="20">
                            <stop offset="0%" stop-color="#FFA500"/>
                            <stop offset="100%" stop-color="#FF6B00"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 4L4 8L12 12L20 8L12 4Z" fill="url(#logoGrad)"/>
                    <path d="M4 12L12 16L20 12" stroke="#FFA500" stroke-width="2" fill="none"/>
                    <path d="M4 16L12 20L20 16" stroke="#FF6B00" stroke-width="2" fill="none"/>
                </svg>
                <h1>KaanWave</h1>
            </div>
            
            <div class="input-group">
                <label>
                    <svg viewBox="0 0 24 24" fill="none" stroke="#FFA500" stroke-width="2">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    </svg>
                    Kullanıcı Adı
                </label>
                <input type="text" id="username" placeholder="Kullanıcı adınız">
            </div>
            
            <div class="input-group">
                <label>
                    <svg viewBox="0 0 24 24" fill="none" stroke="#FFA500" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Şifre
                </label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            
            <button class="login-btn" onclick="login()">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
                </svg>
                Giriş Yap
            </button>
            
            <div id="error-message"></div>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username && password) {
                localStorage.setItem('kaanwave_user', username);
                window.location.href = 'home.html';
            } else {
                document.getElementById('error-message').textContent = 'Kullanıcı adı ve şifre girin!';
            }
        }

        if (localStorage.getItem('kaanwave_user')) {
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
