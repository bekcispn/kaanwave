<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaanWave - Müzik Akışı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 800px;
            background: linear-gradient(180deg, #1a1000 0%, #0d0800 100%);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.3);
            border: 1px solid #FF8C00;
            display: flex;
            flex-direction: column;
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0f0a00;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }

        .loading-logo {
            font-size: 50px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .loading-text {
            color: #FFA500;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .loading-sub {
            color: #FF8C00;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 140, 0, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFA500, #FF6B00);
            transition: width 0.3s;
            animation: shimmer 1s infinite;
        }

        @keyframes shimmer {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        /* MAIN CONTENT */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 140, 0, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo span {
            color: #FFA500;
            font-size: 22px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .header-btn {
            color: #FFA500;
            font-size: 22px;
            cursor: pointer;
        }

        /* SEARCH BAR */
        .search-container {
            padding: 15px 20px;
        }

        .search-box {
            background: rgba(255, 140, 0, 0.1);
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 25px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box span {
            color: #FFA500;
            font-size: 18px;
        }

        #search-input {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            width: 100%;
            outline: none;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* CONTENT AREA */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 15px;
        }

        .section-header h3 {
            color: #FFA500;
            font-size: 18px;
            font-weight: 600;
        }

        .section-header a {
            color: rgba(255, 140, 0, 0.7);
            font-size: 13px;
            text-decoration: none;
        }

        /* CATEGORIES */
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
            margin-bottom: 20px;
        }

        .category {
            background: rgba(255, 140, 0, 0.15);
            border: 1px solid rgba(255, 140, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            color: #FFA500;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category:hover {
            background: rgba(255, 140, 0, 0.3);
        }

        .category.active {
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            color: white;
        }

        /* PLAYLIST CARDS */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .playlist-card {
            background: rgba(20, 15, 0, 0.8);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .playlist-card:hover {
            background: rgba(255, 140, 0, 0.1);
            border-color: #FF8C00;
        }

        .playlist-cover {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #FF8C00, #CC5500);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin-bottom: 10px;
            box-shadow: 0 4px 0 #994C00;
        }

        .playlist-title {
            color: white;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .playlist-desc {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        /* TRACK LIST */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(20, 15, 0, 0.6);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .track-item:hover {
            background: rgba(255, 140, 0, 0.15);
            border-color: #FF8C00;
        }

        .track-item.playing {
            background: rgba(255, 140, 0, 0.2);
            border: 2px solid #FFA500;
        }

        .track-cover {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .track-info {
            flex: 1;
        }

        .track-title {
            color: white;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .track-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .track-duration {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        /* PLAYER BAR */
        .player-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid #FF8C00;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-cover {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .player-info {
            flex: 1;
        }

        .player-title {
            color: white;
            font-weight: 500;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .player-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-btn {
            color: #FFA500;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .player-btn:hover {
            color: #FFD700;
            transform: scale(1.1);
        }

        .player-btn.play {
            font-size: 28px;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 140, 0, 0.2);
            padding: 10px 30px;
            display: flex;
            justify-content: space-around;
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.5);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #FFA500;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF8C00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- LOADING -->
        <div id="loading-screen">
            <div class="loading-logo">🌊🎵</div>
            <div class="loading-text">KaanWave</div>
            <div class="loading-sub" id="loading-message">Başlatılıyor...</div>
            <div class="loading-bar">
                <div class="loading-progress" id="loading-progress"></div>
            </div>
        </div>

        <!-- MAIN -->
        <div id="main-content">
            <!-- HEADER -->
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">🌊</div>
                    <span>KaanWave</span>
                </div>
                <div class="header-actions">
                    <span class="header-btn">🔔</span>
                    <span class="header-btn">⚙️</span>
                </div>
            </div>

            <!-- SEARCH -->
            <div class="search-container">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="search-input" placeholder="Ne dinlemek istersin?">
                </div>
            </div>

            <!-- CONTENT -->
            <div class="content-area" id="content-area">
                <!-- Ana Sayfa İçeriği -->
                <div id="home-content">
                    <div class="section-header">
                        <h3>Senin için</h3>
                        <a href="#">Tümü ›</a>
                    </div>

                    <div class="categories">
                        <span class="category active">Tümü</span>
                        <span class="category">Müzik</span>
                        <span class="category">Podcast</span>
                        <span class="category">Canlı</span>
                    </div>

                    <div class="playlist-grid">
                        <div class="playlist-card" onclick="playPlaylist('daily')">
                            <div class="playlist-cover">📅</div>
                            <div class="playlist-title">Günlük Mix 1</div>
                            <div class="playlist-desc">Senin için seçildi</div>
                        </div>
                        <div class="playlist-card" onclick="playPlaylist('discover')">
                            <div class="playlist-cover">🔍</div>
                            <div class="playlist-title">Keşfet</div>
                            <div class="playlist-desc">Yeni müzikler</div>
                        </div>
                        <div class="playlist-card" onclick="playPlaylist('hits')">
                            <div class="playlist-cover">🔥</div>
                            <div class="playlist-title">Hit'ler</div>
                            <div class="playlist-desc">En popüler</div>
                        </div>
                        <div class="playlist-card" onclick="playPlaylist('chill')">
                            <div class="playlist-cover">😌</div>
                            <div class="playlist-title">Chill Vibes</div>
                            <div class="playlist-desc">Rahatla</div>
                        </div>
                    </div>

                    <div class="section-header">
                        <h3>Popüler Parçalar</h3>
                        <a href="#">Tümü ›</a>
                    </div>

                    <div class="track-list" id="popular-tracks"></div>
                </div>
            </div>

            <!-- PLAYER BAR -->
            <div class="player-bar">
                <div class="player-cover" id="player-cover">🎵</div>
                <div class="player-info">
                    <div class="player-title" id="player-title">Parça Seçilmedi</div>
                    <div class="player-artist" id="player-artist">KaanWave</div>
                </div>
                <div class="player-controls">
                    <span class="player-btn" onclick="previousTrack()">⏮️</span>
                    <span class="player-btn play" id="play-btn" onclick="togglePlay()">▶️</span>
                    <span class="player-btn" onclick="nextTrack()">⏭️</span>
                </div>
            </div>

            <!-- BOTTOM NAV -->
            <div class="bottom-nav">
                <span class="nav-item active" onclick="switchTab('home')">🏠</span>
                <span class="nav-item" onclick="switchTab('search')">🔍</span>
                <span class="nav-item" onclick="switchTab('library')">📚</span>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // SPOTIFY BENZERİ GERÇEK MÜZİK ÇALAR
        const audio = document.getElementById('audio-player');
        let currentTrack = null;
        let isPlaying = false;
        let currentPlaylist = [];
        let currentIndex = 0;

        // GERÇEK MÜZİK VERİLERİ (iTunes Preview'lar - 30sn)
        const TRACKS = {
            popular: [
                { title: "Flowers", artist: "Miley Cyrus", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview122/v4/79/3c/71/793c7192-a418-8c1e-91fd-c69d8a39d8b5/mzaf_8733856475155602056.plus.aac.ep.m4a", cover: "🌸" },
                { title: "As It Was", artist: "Harry Styles", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/8e/72/08/8e7208ab-8284-2f34-8d0c-5a9e6a20e01f/mzaf_1852244752593361719.plus.aac.ep.m4a", cover: "🕺" },
                { title: "Blinding Lights", artist: "The Weeknd", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/d3/6a/bf/d36abf53-11c8-a4e9-6e66-f787bcfe38e9/mzaf_1650103741823680489.plus.aac.ep.m4a", cover: "🌃" },
                { title: "Stay", artist: "The Kid LAROI & Justin Bieber", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview122/v4/95/18/f3/9518f3da-ff62-169f-68c1-c4dbb7f4da23/mzaf_1155385648758673618.plus.aac.ep.m4a", cover: "⚡" },
                { title: "Levitating", artist: "Dua Lipa", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/16/f6/92/16f692ee-5fbd-5f16-7b05-9dd58c2e53d5/mzaf_1814395094507165734.plus.aac.ep.m4a", cover: "🪩" }
            ],
            hits: [
                { title: "Dance Monkey", artist: "Tones and I", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/29/23/f6/2923f6ed-5b78-3f2c-74a1-a8b59d7e87e4/mzaf_8985552714785851505.plus.aac.ep.m4a", cover: "🐒" },
                { title: "Bad Guy", artist: "Billie Eilish", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/2f/b8/62/2fb86256-1c1c-8764-38f8-1fbb2f21f2f5/mzaf_1456568504673263049.plus.aac.ep.m4a", cover: "👁️" },
                { title: "Shape of You", artist: "Ed Sheeran", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview122/v4/97/5e/c9/975ec906-450d-10e3-2911-1a3fef3d47fa/mzaf_776118586684465170.plus.aac.ep.m4a", cover: "🎸" }
            ],
            chill: [
                { title: "Watermelon Sugar", artist: "Harry Styles", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/50/0c/84/500c84a5-2a3b-17a8-4c8b-aa1b130e7b3b/mzaf_1650492773673003959.plus.aac.ep.m4a", cover: "🍉" },
                { title: "Peaches", artist: "Justin Bieber", preview: "https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview122/v4/2b/e0/57/2be0576a-fce2-a23e-437b-47a68fe07f22/mzaf_6094736591473711649.plus.aac.ep.m4a", cover: "🍑" }
            ]
        };

        // LOADING SIMULASYONU
        const loadingMessages = [
            "KaanWave başlatılıyor...",
            "Müzikler hazırlanıyor...",
            "Dalgalar ayarlanıyor...",
            "Neredeyse hazır...",
            "Keyifli dinlemeler! 🎧"
        ];

        let progress = 0;
        const loadingInterval = setInterval(() => {
            progress += 2;
            document.getElementById('loading-progress').style.width = progress + '%';
            
            const msgIndex = Math.floor(progress / 20);
            if (msgIndex < loadingMessages.length) {
                document.getElementById('loading-message').textContent = loadingMessages[msgIndex];
            }
            
            if (progress >= 100) {
                clearInterval(loadingInterval);
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('main-content').style.opacity = '1';
                        renderPopularTracks();
                    }, 500);
                }, 300);
            }
        }, 40);

        // POPÜLER PARÇALARI GÖSTER
        function renderPopularTracks() {
            const container = document.getElementById('popular-tracks');
            container.innerHTML = '';
            
            TRACKS.popular.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.onclick = () => playTrack(track, TRACKS.popular, index);
                div.innerHTML = `
                    <div class="track-cover">${track.cover}</div>
                    <div class="track-info">
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                    <div class="track-duration">▶️</div>
                `;
                container.appendChild(div);
            });
        }

        // MÜZİK ÇAL
        function playTrack(track, playlist, index) {
            currentTrack = track;
            currentPlaylist = playlist;
            currentIndex = index;
            
            document.getElementById('player-cover').textContent = track.cover;
            document.getElementById('player-title').textContent = track.title;
            document.getElementById('player-artist').textContent = track.artist;
            
            audio.src = track.preview;
            audio.play();
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸️';
            
            // Aktif track'i işaretle
            document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing'));
            event?.currentTarget?.classList.add('playing');
        }

        function togglePlay() {
            if (!currentTrack) {
                playTrack(TRACKS.popular[0], TRACKS.popular, 0);
                return;
            }
            
            if (isPlaying) {
                audio.pause();
                document.getElementById('play-btn').textContent = '▶️';
            } else {
                audio.play();
                document.getElementById('play-btn').textContent = '⏸️';
            }
            isPlaying = !isPlaying;
        }

        function nextTrack() {
            if (currentPlaylist.length > 0) {
                const nextIndex = (currentIndex + 1) % currentPlaylist.length;
                playTrack(currentPlaylist[nextIndex], currentPlaylist, nextIndex);
            }
        }

        function previousTrack() {
            if (currentPlaylist.length > 0) {
                const prevIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
                playTrack(currentPlaylist[prevIndex], currentPlaylist, prevIndex);
            }
        }

        function playPlaylist(type) {
            let playlist = [];
            switch(type) {
                case 'daily': playlist = TRACKS.popular; break;
                case 'discover': playlist = [...TRACKS.popular, ...TRACKS.hits]; break;
                case 'hits': playlist = TRACKS.hits; break;
                case 'chill': playlist = TRACKS.chill; break;
            }
            if (playlist.length > 0) {
                playTrack(playlist[0], playlist, 0);
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Tab içeriği değişimi (basit)
            const content = document.getElementById('home-content');
            if (tab === 'home') {
                content.innerHTML = getHomeContent();
                renderPopularTracks();
            } else if (tab === 'search') {
                content.innerHTML = '<div style="padding:20px;color:#FFA500;text-align:center">🔍 Arama sayfası</div>';
            } else {
                content.innerHTML = '<div style="padding:20px;color:#FFA500;text-align:center">📚 Kütüphanen</div>';
            }
        }

        function getHomeContent() {
            return `
                <div class="section-header"><h3>Senin için</h3><a href="#">Tümü ›</a></div>
                <div class="categories">
                    <span class="category active">Tümü</span>
                    <span class="category">Müzik</span>
                    <span class="category">Podcast</span>
                    <span class="category">Canlı</span>
                </div>
                <div class="playlist-grid">
                    <div class="playlist-card" onclick="playPlaylist('daily')">
                        <div class="playlist-cover">📅</div>
                        <div class="playlist-title">Günlük Mix 1</div>
                        <div class="playlist-desc">Senin için seçildi</div>
                    </div>
                    <div class="playlist-card" onclick="playPlaylist('discover')">
                        <div class="playlist-cover">🔍</div>
                        <div class="playlist-title">Keşfet</div>
                        <div class="playlist-desc">Yeni müzikler</div>
                    </div>
                    <div class="playlist-card" onclick="playPlaylist('hits')">
                        <div class="playlist-cover">🔥</div>
                        <div class="playlist-title">Hit'ler</div>
                        <div class="playlist-desc">En popüler</div>
                    </div>
                    <div class="playlist-card" onclick="playPlaylist('chill')">
                        <div class="playlist-cover">😌</div>
                        <div class="playlist-title">Chill Vibes</div>
                        <div class="playlist-desc">Rahatla</div>
                    </div>
                </div>
                <div class="section-header"><h3>Popüler Parçalar</h3><a href="#">Tümü ›</a></div>
                <div class="track-list" id="popular-tracks"></div>
            `;
        }

        // Audio eventleri
        audio.addEventListener('ended', nextTrack);
        audio.addEventListener('pause', () => {
            isPlaying = false;
            document.getElementById('play-btn').textContent = '▶️';
        });
        audio.addEventListener('play', () => {
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸️';
        });
    </script>
</body>
</html>
