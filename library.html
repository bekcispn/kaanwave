<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaanWave • Kütüphane</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
        }

        #app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 140, 0, 0.2);
            padding: 30px 0;
            position: fixed;
            height: 100vh;
        }

        .sidebar-logo {
            padding: 0 20px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo svg {
            width: 40px;
            height: 40px;
        }

        .sidebar-logo span {
            color: #FFA500;
            font-size: 22px;
            font-weight: 700;
        }

        .nav-menu {
            padding: 0 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .nav-item:hover {
            background: rgba(255, 140, 0, 0.1);
            color: #FFA500;
        }

        .nav-item.active {
            background: rgba(255, 140, 0, 0.2);
            color: #FFA500;
            border-left: 4px solid #FF8C00;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .main-area {
            flex: 1;
            margin-left: 260px;
            padding: 30px 40px;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 20px;
        }

        .section-header h2 {
            color: white;
            font-size: 26px;
            font-weight: 700;
        }

        .create-btn {
            background: linear-gradient(135deg, #FFA500, #FF6B00);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .playlist-card {
            background: rgba(20, 15, 0, 0.6);
            border: 1.5px solid rgba(255, 140, 0, 0.2);
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .playlist-card:hover {
            background: rgba(255, 140, 0, 0.12);
            border-color: #FF8C00;
            transform: translateY(-5px);
        }

        .playlist-cover {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #FF8C00, #CC5500);
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #994C00;
        }

        .playlist-cover svg {
            width: 50px;
            height: 50px;
            color: white;
        }

        .playlist-title {
            color: white;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .playlist-count {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .liked-songs-card {
            grid-column: span 2;
            background: linear-gradient(135deg, #450af5, #8b5cf6);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF8C00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="4" y1="4" x2="20" y2="20">
                            <stop offset="0%" stop-color="#FFA500"/>
                            <stop offset="100%" stop-color="#FF6B00"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 4L4 8L12 12L20 8L12 4Z" fill="url(#logoGrad)"/>
                    <path d="M4 12L12 16L20 12" stroke="#FFA500" stroke-width="2"/>
                </svg>
                <span>KaanWave</span>
            </div>
            <div class="nav-menu">
                <a href="home.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 12l9-9 9 9M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
                    </svg>
                    Ana Sayfa
                </a>
                <a href="search.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4-4"/>
                    </svg>
                    Ara
                </a>
                <a href="library.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="8" height="8" rx="1"/>
                        <rect x="13" y="3" width="8" height="8" rx="1"/>
                        <rect x="3" y="13" width="8" height="8" rx="1"/>
                        <rect x="13" y="13" width="8" height="8" rx="1"/>
                    </svg>
                    Kütüphane
                </a>
            </div>
        </div>

        <div class="main-area">
            <div class="top-header">
                <div class="user-area">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">K</div>
                        <span id="username">Kullanıcı</span>
                    </div>
                </div>
            </div>

            <div class="section-header">
                <h2>Kütüphanen</h2>
                <button class="create-btn" onclick="createPlaylist()">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Yeni Playlist
                </button>
            </div>

            <div class="library-grid" id="library-grid">
                <!-- Beğenilen Şarkılar -->
                <div class="playlist-card liked-songs-card">
                    <div class="playlist-cover" style="background: linear-gradient(135deg, #450af5, #8b5cf6); box-shadow: 0 6px 0 #3b0764;">
                        <svg viewBox="0 0 24 24" fill="white" width="40" height="40">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </div>
                    <div class="playlist-title">Beğenilen Şarkılar</div>
                    <div class="playlist-count">45 şarkı</div>
                </div>

                <!-- Örnek Playlistler -->
                <div class="playlist-card">
                    <div class="playlist-cover">
                        <svg viewBox="0 0 24 24" fill="white">
                            <path d="M9 18V6l12 6-12 6z"/>
                        </svg>
                    </div>
                    <div class="playlist-title">Chill Vibes</div>
                    <div class="playlist-count">24 şarkı</div>
                </div>

                <div class="playlist-card">
                    <div class="playlist-cover">
                        <svg viewBox="0 0 24 24" fill="white">
                            <path d="M12 2v20M22 12H2"/>
                        </svg>
                    </div>
                    <div class="playlist-title">Workout Mix</div>
                    <div class="playlist-count">18 şarkı</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('kaanwave_user');
        if (!user) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('username').textContent = user;
            document.getElementById('userAvatar').textContent = user[0].toUpperCase();
        }

        function createPlaylist() {
            const name = prompt('Playlist adı:');
            if (name) {
                const grid = document.getElementById('library-grid');
                const card = document.createElement('div');
                card.className = 'playlist-card';
                card.innerHTML = `
                    <div class="playlist-cover">
                        <svg viewBox="0 0 24 24" fill="white">
                            <path d="M9 18V6l12 6-12 6z"/>
                        </svg>
                    </div>
                    <div class="playlist-title">${name}</div>
                    <div class="playlist-count">0 şarkı</div>
                `;
                grid.appendChild(card);
            }
        }
    </script>
</body>
</html>
