<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaanWave • Playlist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
        }

        #app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 140, 0, 0.2);
            padding: 30px 0;
            position: fixed;
            height: 100vh;
        }

        .sidebar-logo {
            padding: 0 20px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo svg {
            width: 40px;
            height: 40px;
        }

        .sidebar-logo span {
            color: #FFA500;
            font-size: 22px;
            font-weight: 700;
        }

        .nav-menu {
            padding: 0 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .nav-item:hover {
            background: rgba(255, 140, 0, 0.1);
            color: #FFA500;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .main-area {
            flex: 1;
            margin-left: 260px;
            padding: 0;
        }

        .playlist-header {
            height: 300px;
            background: linear-gradient(180deg, #FF8C00 0%, #1a1000 100%);
            padding: 80px 40px 30px;
            display: flex;
            align-items: flex-end;
            gap: 30px;
        }

        .playlist-cover-large {
            width: 220px;
            height: 220px;
            background: linear-gradient(135deg, #FFA500, #CC5500);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .playlist-cover-large svg {
            width: 80px;
            height: 80px;
            color: white;
        }

        .playlist-info h2 {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .playlist-meta {
            color: rgba(255,255,255,0.7);
        }

        .track-list-container {
            padding: 30px 40px;
        }

        .playlist-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .play-btn-large {
            width: 60px;
            height: 60px;
            background: #FFA500;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #994C00;
        }

        .tracks-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tracks-table th {
            text-align: left;
            padding: 12px 15px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
            border-bottom: 1px solid rgba(255,140,0,0.2);
        }

        .track-row td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,140,0,0.1);
        }

        .track-row:hover {
            background: rgba(255,140,0,0.1);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF8C00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="4" y1="4" x2="20" y2="20">
                            <stop offset="0%" stop-color="#FFA500"/>
                            <stop offset="100%" stop-color="#FF6B00"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 4L4 8L12 12L20 8L12 4Z" fill="url(#logoGrad)"/>
                    <path d="M4 12L12 16L20 12" stroke="#FFA500" stroke-width="2"/>
                </svg>
                <span>KaanWave</span>
            </div>
            <div class="nav-menu">
                <a href="home.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 12l9-9 9 9M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
                    </svg>
                    Ana Sayfa
                </a>
                <a href="search.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4-4"/>
                    </svg>
                    Ara
                </a>
                <a href="library.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="8" height="8" rx="1"/>
                        <rect x="13" y="3" width="8" height="8" rx="1"/>
                        <rect x="3" y="13" width="8" height="8" rx="1"/>
                        <rect x="13" y="13" width="8" height="8" rx="1"/>
                    </svg>
                    Kütüphane
                </a>
            </div>
        </div>

        <div class="main-area">
            <div class="playlist-header">
                <div class="playlist-cover-large">
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M9 18V6l12 6-12 6z"/>
                    </svg>
                </div>
                <div class="playlist-info">
                    <h2>Chill Vibes</h2>
                    <div class="playlist-meta">Kaan • 24 şarkı • 1s 30dk</div>
                </div>
            </div>

            <div class="track-list-container">
                <div class="playlist-controls">
                    <button class="play-btn-large">
                        <svg viewBox="0 0 24 24" fill="white" width="30" height="30">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button style="background: none; border: none; color: #FFA500; cursor: pointer;">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </button>
                </div>

                <table class="tracks-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Başlık</th>
                            <th>Albüm</th>
                            <th>Süre</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="track-row">
                            <td>1</td>
                            <td>Flowers</td>
                            <td>Endless Summer Vacation</td>
                            <td>3:20</td>
                        </tr>
                        <tr class="track-row">
                            <td>2</td>
                            <td>As It Was</td>
                            <td>Harry's House</td>
                            <td>2:47</td>
                        </tr>
                        <tr class="track-row">
                            <td>3</td>
                            <td>Blinding Lights</td>
                            <td>After Hours</td>
                            <td>3:20</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('kaanwave_user');
        if (!user) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
